name: Sentinel Framework CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # AGENTS.md Rule 7: the core directive and the raw fallback template must never drift apart.
      - name: Verify core directive and template are in sync
        run: |
          if ! diff -q skills/sentinel/SKILL.md templates/sentinel-directive.md; then
            echo "::error::skills/sentinel/SKILL.md and templates/sentinel-directive.md have drifted apart (AGENTS.md Rule 7)."
            diff skills/sentinel/SKILL.md templates/sentinel-directive.md || true
            exit 1
          fi

      - name: Verify every skill has valid frontmatter and trigger-rich description
        run: |
          python -c "
          import os, re
          fail = 0
          for root, dirs, files in os.walk('skills'):
              for file in files:
                  if file == 'SKILL.md':
                      p = os.path.join(root, file)
                      with open(p, 'r', encoding='utf-8') as f:
                          content = f.read()
                      parts = content.split('---')
                      if len(parts) < 3:
                          print(f'::error file={p}::missing or malformed frontmatter')
                          fail = 1
                          continue
                      fm = parts[1]
                      if 'name:' not in fm:
                          print(f'::error file={p}::missing name')
                          fail = 1
                      if 'description:' not in fm:
                          print(f'::error file={p}::missing description')
                          fail = 1
                      if 'triggers:' in fm:
                          print(f'::error file={p}::defunct triggers block found')
                          fail = 1
                      desc_match = re.search(r'description:\s*(?:>-)?\s*(.*?)(?=\n\S+:|\n---|$)', fm, re.DOTALL)
                      if not desc_match:
                          print(f'::error file={p}::unable to parse description content')
                          fail = 1
                          continue
                      desc = desc_match.group(1).strip()
                      desc = re.sub(r'\s+', ' ', desc)
                      if len(desc) < 200:
                          print(f'::error file={p}::description is too short ({len(desc)} chars, min 200)')
                          fail = 1
                      is_destructive = any(x in p for x in ['rescue', 'prune', 'handoff', 'coauth'])
                      if is_destructive:
                          if 'Only run when the user explicitly invokes' not in desc:
                              print(f'::error file={p}::destructive skill missing explicit-only warning')
                              fail = 1
                      else:
                          if 'Use when' not in desc:
                              print(f'::error file={p}::standard skill missing Use when trigger phrase')
                              fail = 1
          exit(fail)
          "

      # AGENTS.md Rule 2: canonical directory names only (changelog singular, audits plural).
      - name: Verify canonical memory-bank directory naming
        run: |
          if grep -rn --include='*.md' -E '\.memory-bank/(changelogs|audit-reports)/' skills/ templates/ docs/ README.md; then
            echo "::error::non-canonical memory-bank directory name detected (AGENTS.md Rule 2)"
            exit 1
          fi
